name: Static Analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install ruff bandit

      - name: Run Ruff (critical checks)
        run: |
          ruff check src tests --select E9,F63,F7,F82 --output-format=github

      - name: Run Bandit (security scan)
        run: |
          bandit -r src -ll -q

      - name: Run tests
        run: |
          pytest -q --tb=short

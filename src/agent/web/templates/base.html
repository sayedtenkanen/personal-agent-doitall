<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Personal Work Agent{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    nav { background: #1a1a2e; padding: .8rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #e0e0e0; text-decoration: none; font-size: .95rem; }
    nav a:hover { color: #fff; }
    nav .brand { color: #7eb8f7; font-weight: 700; font-size: 1.1rem; margin-right: 1rem; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin-bottom: .75rem; color: #333; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th, td { padding: .65rem 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: .9rem; }
    th { background: #f0f4ff; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .btn { display: inline-block; padding: .45rem .9rem; border-radius: 5px; font-size: .875rem; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid #ccc; color: #555; }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-yellow { background: #fef9c3; color: #a16207; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 1.25rem; margin-bottom: 1rem; }
    .flash-warning { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px; padding: .75rem 1rem; margin-bottom: 1rem; color: #92400e; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .875rem; font-weight: 600; margin-bottom: .3rem; }
    input[type=text], input[type=email], select, textarea {
      width: 100%; padding: .5rem .75rem; border: 1px solid #ccc; border-radius: 5px; font-size: .9rem; font-family: inherit;
    }
    textarea { min-height: 280px; font-family: 'Courier New', monospace; font-size: .85rem; }
    .mono { font-family: 'Courier New', monospace; font-size: .8rem; color: #555; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; font-size: .85rem; }
    .row { display: flex; gap: 1rem; }
    .col { flex: 1; }
    .stat-card { background: #fff; border-radius: 8px; padding: 1.2rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: #2563eb; }
    .stat-card .label { font-size: .85rem; color: #666; margin-top: .25rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">⚡ Agent</span>
    <a href="/">Dashboard</a>
    <a href="/documents">Documents</a>
    <a href="/memory">Memory</a>
    <a href="/links">Links</a>
    <a href="/conflicts">Conflicts</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

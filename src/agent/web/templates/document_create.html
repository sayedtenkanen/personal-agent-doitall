{% extends "base.html" %}
{% block title %}New Document{% endblock %}
{% block content %}
<h1>New Document</h1>
{% if error %}
<div class="flash-warning">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/documents/create">
    <div class="row">
      <div class="col form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ title or '' }}" required placeholder="Onboarding Guide">
      </div>
      <div class="col form-group">
        <label for="slug">Slug <span style="font-weight:400;color:#999">(unique identifier, no spaces)</span></label>
        <input type="text" id="slug" name="slug" value="{{ slug or '' }}" required placeholder="onboarding-guide">
      </div>
    </div>
    <div class="form-group">
      <label for="content">Content (Markdown)</label>
      <textarea id="content" name="content" required>{{ content or '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="changelog">Changelog message</label>
      <input type="text" id="changelog" name="changelog" value="Initial version" required>
    </div>
    <button type="submit" class="btn btn-primary">Create Document</button>
    <a href="/documents" class="btn btn-ghost" style="margin-left:.5rem;">Cancel</a>
  </form>
</div>
{% endblock %}
